sonar.projectKey=hobsojam_seavious
sonar.organization=hobsojam
sonar.projectName=seavious

sonar.sources=src,tools
sonar.exclusions=build/**,vcpkg_installed/**
# The asset generators are intentionally explicit and asset-specific (see
# README art pipeline) — twin structure across them is the convention, not
# copy-paste debt — so they're exempt from duplication detection only.
sonar.cpd.exclusions=tools/*.ps1,tools/gen-*.py

# C-family analysis runs in GitHub Actions with a compilation database from
# Sonar's build wrapper. Do not rely on SonarCloud Automatic Analysis.
