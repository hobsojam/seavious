name: SonarCloud

on:
  push:
    branches:
      - main
      - 'agent/**'
  pull_request:
    branches:
      - main

jobs:
  analyze:
    name: SonarCloud
    if: github.actor != 'dependabot[bot]'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read

    steps:
      - name: Check out source
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Run SonarCloud analysis
        uses: SonarSource/sonarcloud-github-action@v5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
