name: SonarCloud

on:
  push:
    branches: [main]
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: read

jobs:
  analyze:
    name: SonarCloud
    if: github.actor != 'dependabot[bot]'
    runs-on: ubuntu-latest
    env:
      BUILD_WRAPPER_OUT_DIR: build-wrapper-output

    steps:
      - name: Check out source
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            xorg-dev \
            libx11-dev \
            libxrandr-dev \
            libxinerama-dev \
            libxcursor-dev \
            libxi-dev \
            xvfb \
            xauth \
            gcovr \
            libopenmpt0t64 \
            python3-coverage
      - name: Set up vcpkg
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgJsonGlob: 'vcpkg.json'

      - name: Configure CMake
        run: >
          cmake -S . -B build -G Ninja
          -DCMAKE_BUILD_TYPE=Debug
          -DCMAKE_C_FLAGS="--coverage -O0 -g"
          -DCMAKE_EXE_LINKER_FLAGS="--coverage"
          -DCMAKE_TOOLCHAIN_FILE="$VCPKG_ROOT/scripts/buildsystems/vcpkg.cmake"
          -DVCPKG_OVERLAY_PORTS="$GITHUB_WORKSPACE/vcpkg-overlays"

      - name: Install Sonar build wrapper
        uses: SonarSource/sonarqube-scan-action/install-build-wrapper@v8.1.0

      - name: Build under Sonar build wrapper
        run: >
          build-wrapper-linux-x86-64 --out-dir "$BUILD_WRAPPER_OUT_DIR"
          cmake --build build --config Debug

      - name: Run unit tests and generate coverage
        run: |
          ctest --test-dir build --output-on-failure
          gcovr --root "$GITHUB_WORKSPACE" --filter "$GITHUB_WORKSPACE/src" \
            --sonarqube coverage.xml build

      - name: Validate generated assets and generate Python coverage
        run: |
          python3 -m coverage run --include='tools/*' tests/test_xm_assets.py
          python3 -m coverage run -a --include='tools/*' tests/test_sfx_assets.py
          python3 -m coverage run -a --include='tools/*' tests/test_sprite_assets.py
          python3 -m coverage run -a --include='tools/*' tests/test_stage_table.py
          python3 -m coverage run -a --include='tools/*' tests/test_icon_asset.py
          python3 -m coverage run -a --include='tools/*' tests/test_terrain_art_templates.py
          python3 -m coverage run -a --include='tools/*' tests/test_pngread.py
          python3 -m coverage run -a --include='tools/*' tests/test_terrain_feature_atlas.py
          python3 -m coverage run -a --include='tools/*' tests/test_terrain_ground_tile.py
          python3 -m coverage xml -o coverage-python.xml

      - name: Scan with SonarCloud
        uses: SonarSource/sonarqube-scan-action@v8.2.1
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            --define sonar.cfamily.compile-commands=${{ env.BUILD_WRAPPER_OUT_DIR }}/compile_commands.json
            --define sonar.coverageReportPaths=coverage.xml
            --define sonar.python.coverage.reportPaths=coverage-python.xml
